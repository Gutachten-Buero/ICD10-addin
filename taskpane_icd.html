  { id:161, cat:3, titel:"F30.0 – Hypomanie Dauer / Grundmuster Dauer / Grundmuster - Anhaltend leicht gehobene, expansive oder gereizte Stimmung über mindestens einige Tage, mit deutlich gesteigertem Antrieb/Aktivität. Typische Symptome (mehrere müssen deutlich vorliegen) - Gesteigerte Geselligkeit/Gesprächigkeit, übermäßige Vertraulichkeit. - Verringertes Schlafbedürfnis. - Gesteigerte Libido. - Ablenkbarkeit/Konzentrationsstörungen, Rededrang/Ideenflucht, Unruhe/mehr Aktivität. - Überoptimismus/Selbstüberschätzung, Leichtsinn (z. B. Ausgaben, riskantes Verhalten). Schweregrad / Abgrenzung - Keine Halluzinationen oder Wahn (sonst Manie mit Psychose, F30.2). - Die Beeinträchtigung ist geringer als bei Manie (i. d. R. kein Berufsabbruch, keine notwendige Hospitalisierung allein wegen der Stimmung). Ausschluss - Nicht besser erklärbar durch psychotrope Substanzen (F1x) oder organische Ursachen (F0). Kodierhinweise - F30.0 = Hypomanie; bei bipolarer Störung: F31.0 „gegenwärtig hypoman\" (mit weiterer affektiver Episode in der Vorgeschichte).", text:"F30.0 Hypomanie Dauer / Grundmuster Dauer / Grundmuster - Anhaltend leicht gehobene, expansive oder gereizte Stimmung über mindestens einige Tage, mit deutlich gesteigertem Antrieb/Aktivität. Typische Symptome (mehrere müssen deutlich vorliegen) - Gesteigerte Geselligkeit/Gesprächigkeit, übermäßige Vertraulichkeit. - Verringertes Schlafbedürfnis. - Gesteigerte Libido. - Ablenkbarkeit/Konzentrationsstörungen, Rededrang/Ideenflucht, Unruhe/mehr Aktivität. - Überoptimismus/Selbstüberschätzung, Leichtsinn (z. B. Ausgaben, riskantes Verhalten). Schweregrad / Abgrenzung - Keine Halluzinationen oder Wahn (sonst Manie mit Psychose, F30.2). - Die Beeinträchtigung ist geringer als bei Manie (i. d. R. kein Berufsabbruch, keine notwendige Hospitalisierung allein wegen der Stimmung). Ausschluss - Nicht besser erklärbar durch psychotrope Substanzen (F1x) oder organische Ursachen (F0). Kodierhinweise - F30.0 = Hypomanie; bei bipolarer Störung: F31.0 „gegenwärtig hypoman\" (mit weiterer affektiver Episode in der Vorgeschichte)." },

  { id:430, cat:10, titel:"F99 – Psychische Störung ohne nähere Angabe • ICD-10 Z73 Persönlichkeitsakzentuierung / V.a. Persönlichkeitsstörung > Z56 Unstimmigkeiten mit Vorgesetzten oder Arbeitskollegen - [Sonstige Auffälligkeiten/Diagnosen:]{.underline} Siehe Ergebnisse unter Punkt IV Zusatzuntersuchungen [Prognose über eine Verschlechterung des Gesundheitszustandes/Leistungskalküls.]{.underline} Derzeit bestehen keine Hinweise darauf, dass bei Einhaltung der Mitwirkungspflichten durch die klagende Partei in absehbarer Zeit (innerhalb der nächsten 18 Monate) mit einer kalkülsrelevanten Verschlechterung des Gesundheitszustandes (fachspezifisch) zu rechnen wäre. Regelmäßige fachärztliche Kontrollen, situationsadäquate kurzfristige Anpassungen der Medikation, therapeutische Gespräche und diagnosespezifische Psychoedukation sind zwingend notwendig.[^1]Überschrift für die Sammlung Gutachterliche Textbausteine Vorschlag für prägnante TXT-Überschriften - Psychopathologischer_Befund - Zusammenfassende_Beurteilung - Medikation_Compliance_Labor - Inkonsistenzen_Plausibilitaet - Leistungskalkuel_Zumutbarkeit - Besserungsmoeglichkeiten - Pflegebedarf - Vergleichsgutachten - Pharmakogenetik_Interaktionen - Beratungsangebote Ich habe die Bausteine thematisch sortiert und zusammengehörende Passagen jeweils in einem Block belassen. Widersprüchliche Inhalte habe ich nicht zusammengeführt, sondern als getrennte Bausteine stehen gelassen, da sie erkennbar aus unterschiedlichen Fallkonstellationen stammen. # 1. Psychopathologischer Befund ## Behandlungsbereitschaft und klinischer Eindruck Die Behandlungsbereitschaft erscheint fraglich. Einschlaf- und Durchschlafstörungen werden berichtet. Eine Tagesmüdigkeit wird angegeben, vorzeitige Ermüdungserscheinungen lassen sich in der Untersuchung nicht objektivieren. Medikamente, die der Kläger laut Liste einnimmt, kann er nicht benennen und verweist auf die Liste. Eine regelmäßige Einnahme erscheint fraglich. Die Behandlungsbereitschaft erscheint fraglich, nachdem in der Leistungsinformation der ÖGK ersichtlich ist, dass in den letzten Jahren kaum psychopharmakologische Medikamente abgeholt wurden und die Klägerin kaum Auskunft über die Medikamenteneinnahme geben kann. ## Psychopathologischer Untersuchungsbefund Der Kläger imponiert in der Untersuchungssituation freundlich, klagsam und in beiden Skalenbereichen ausreichend affizierbar. Ein affektiver Rapport ist nur eingeschränkt herstellbar bei deutlicher Einengung auf die subjektive Beschwerdesymptomatik. Der formale Gedankenductus erweist sich als umständlich, rigide und beharrlich, der Inhalt anklagend und superlativ. # 2. Zusammenfassende Beurteilung ## Syndromale Einordnung Zusammenfassend ergibt sich ein agitiertes, maniformes Zustandsbild bei vermutlich substanzinduzierter Genese. Eine medikamentöse Compliance erscheint in der Untersuchungssituation deutlich fraglich. Es wird darauf verwiesen, dass die Aussagekraft des gegenständlichen Gutachtens durch die reduzierte Kooperationsbereitschaft deutlich eingeschränkt ist. Zum Untersuchungszeitpunkt erscheint der Kläger nicht in der Lage, einer Erwerbstätigkeit nachzugehen. Insgesamt zeigen sich jedoch keine Verwahrlosungserscheinungen, was grundsätzlich mit erhaltener alltagspraktischer Selbstversorgung vereinbar ist und im Verlauf für eine mögliche Arbeitsfähigkeit sprechen kann. Zusammenfassend ergibt sich ein ängstlich-depressives Zustandsbild, vermutlich bedingt durch zumindest schädlichen Alkoholkonsum beziehungsweise Benzodiazepinkonsum. Es bestehen eine Alkoholabhängigkeit, eine Nikotinabhängigkeit, ängstliche und depressive Zustandsbilder sowie eine Persönlichkeitsakzentuierung. Innerlich unruhiges Zustandsbild bei ursächlich deutlich überdosierter Schilddrüsenmedikation. # 3. Medikation, Compliance und Labor ## Medikamentenkenntnis und Einnahmetreue Die Klägerin berichtet, dass sie Duloxetin auch am Abend nehmen würde. Dies erscheint im vorliegenden Fall als Ausdruck mangelnder Kenntnis über die Medikation bei fehlender Compliance, weil Duloxetin und Trazodon im durchgeführten Medikamentenspiegel unter der Nachweisgrenze lagen. Es zeigt sich eine Diskrepanz zwischen der angegebenen regelmäßigen Medikamenteneinnahme und den hier gemessenen Serumspiegeln. Die Serumspiegel von Sertralin und Lamotrigin liegen im Verhältnis zur angegebenen Dosis und zum Einnahmezeitpunkt unter den zu erwartenden Werten. Eine regelmäßige Einnahme wie verordnet erscheint daher nicht plausibel. Die Einnahmetreue sollte durch regelmäßige Medikamentenspiegelkontrollen überprüft beziehungsweise sichergestellt werden. Laut ÖGK-Leistungsinformation wurden in den letzten Jahren keine beziehungsweise kaum Psychopharmaka bezogen. Die Behandlungsbereitschaft und der subjektive Leidensdruck sind daher anhand der vorliegenden Unterlagen nicht ausreichend belegbar und bedürfen einer weiteren Abklärung. ## CDT-Nachtrag Nachtrag zum Gespräch mit dem Labor betreffend CDT. Die neue Methode entspricht einer Trübungsmessung und kann genetische Varianten nicht identifizieren. Die sensitivere Methode entspricht einer Kapillarelektrophorese und identifiziert genetische Varianten mit erhöhtem CDT-Wert. Dies wäre im Fall des Vorliegens auch schriftlich im Befund festgehalten worden. # 4. Inkonsistenzen, Plausibilität und Motivation ## Inkonsistenzen Als Inkonsistenzen fallen insbesondere die Diskrepanz zwischen dokumentierter beziehungsweise behaupteter Medikation und den Angaben zum Absetzen von Sertralin, die eingeschränkte Ableitbarkeit einer regelmäßigen Einnahme aus dem Leistungsauszug sowie die Uneinheitlichkeit zwischen berichteter langjähriger Paniksymptomatik und der im Arztbrief beschriebenen Abwesenheit von Panikattacken auf. ## Motivation und Begehrungstendenz Es besteht der Verdacht auf eine reduzierte Leistungsmotivation bei negativen motivationalen Bedingungen durch Verschuldung, Unterhaltsverpflichtungen und ein möglicherweise angestrebtes Schuldenregulierungsverfahren. Ärztliche function anzeigen() {
  const liste = document.getElementById("baustein-list");
  const suche = suchbegriff.toLowerCase();

  if (suche) {
    const gefiltert = bausteine.filter(b =>
      b.titel.toLowerCase().includes(suche) ||
      b.text.toLowerCase().includes(suche)
    );
    if (gefiltert.length === 0) {
      liste.innerHTML = '<p class="no-results">Kein Code gefunden.</p>';
      return;
    }
    liste.innerHTML = gefiltert.map(b => {
      const parts = b.titel.split(' – ');
      const code = parts[0];
      const desc = parts.slice(1).join(' – ');
      return `<div class="baustein-card${selectedId===b.id?' selected':''}" data-id="${b.id}" onclick="waehlen(${b.id})">
        <div class="baustein-code">${code}</div>
        <div class="baustein-desc">${desc}</div>
      </div>`;
    }).join('');
    return;
  }

  let html = '';
  kategorien.forEach(kat => {
    const items = bausteine.filter(b => b.cat === kat.id);
    const isOpen = offeneKats.has(kat.id);
    html += `<div class="kat-group">
      <div class="kat-header${isOpen?' open':''}" onclick="toggleKat(${kat.id})">
        <div class="kat-header-left">
          <span class="kat-code">${kat.code}</span>
          <span class="kat-name">${kat.name}</span>
          <span class="kat-count">(${items.length})</span>
        </div>
        <span class="kat-arrow">▼</span>
      </div>
      <div class="kat-body${isOpen?' open':''}">
        ${items.map(b => {
          const parts = b.titel.split(' – ');
          const code = parts[0];
          const desc = parts.slice(1).join(' – ');
          return `<div class="baustein-card${selectedId===b.id?' selected':''}" data-id="${b.id}" onclick="waehlen(${b.id})">
            <div class="baustein-code">${code}</div>
            <div class="baustein-desc">${desc}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });
  liste.innerHTML = html;
}

function toggleKat(id) {
  offeneKats.has(id) ? offeneKats.delete(id) : offeneKats.add(id);
  anzeigen();
}

function waehlen(id) {
  selectedId = id;
  document.querySelectorAll('.baustein-card').forEach(c =>
    c.classList.toggle('selected', parseInt(c.dataset.id) === id)
  );
  document.getElementById('btn-einfuegen').disabled = false;
  document.getElementById('btn-vorschau').disabled = false;
}

function vorschauZeigen() {
  const b = bausteine.find(x => x.id === selectedId);
  if (!b) return;
  const parts = b.titel.split(' – ');
  document.getElementById('vorschau-titel').textContent = parts[0];
  document.getElementById('vorschau-text').textContent = b.text;
  document.getElementById('vorschau-overlay').classList.add('open');
}

function vorschauSchliessen() {
  document.getElementById('vorschau-overlay').classList.remove('open');
}

async function einfuegen() {
  const b = bausteine.find(x => x.id === selectedId);
  if (!b) return;
  try {
    await Word.run(async ctx => {
      const sel = ctx.document.getSelection();
      sel.insertText(b.text, 'Replace');
      await ctx.sync();
    });
    toast('✓ Code eingefügt');
  } catch(e) {
    toast('Demo: ' + b.text);
  }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

document.getElementById('search-input').addEventListener('input', e => {
  suchbegriff = e.target.value;
  selectedId = null;
  document.getElementById('btn-einfuegen').disabled = true;
  document.getElementById('btn-vorschau').disabled = true;
  anzeigen();
});
document.getElementById('btn-vorschau').addEventListener('click', vorschauZeigen);
document.getElementById('btn-einfuegen').addEventListener('click', einfuegen);
document.getElementById('vorschau-close').addEventListener('click', vorschauSchliessen);
document.getElementById('vorschau-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('vorschau-overlay')) vorschauSchliessen();
});
document.getElementById('baustein-list').addEventListener('dblclick', e => {
  if (e.target.closest('.baustein-card')) einfuegen();
});

if (typeof Office !== 'undefined') {
  Office.onReady(() => anzeigen());
} else {
  anzeigen();
}
</script>
